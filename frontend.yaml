- name: configure nginx
  hosts: frontend
  become: yes

  tasks:
   - name: enable nginx 1.24
     ansible.built.command: dnf module enable nginx:1.24 -y

   - name: install nginx
     ansible.builtin.dnf:
      name: nginx
      state: present

   - name: delete the default content in nginx directory
     ansible.builtin.file:
      path: /usr/share/nginx/html/*  # this will delete whole directory
      state: absent

   - name: recreate the deleted directory
     ansible.builtin.file:
     path: /usr/share/nginx/html
     state: present

   - name: download the code from external location
     ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip 
      dest: /tmp/frontend.zip

   - name: unarchieve frontend
     ansible.builtin.unarchive:
      src: /tmp/frontend.zip
      dest: /usr/share/nginx/html
      remote_src: yes   

   - name: copy nginx config file to remote server
     ansible.builtin.template:
      src: nginx.config
      dest: /etc/nginx/nginx.config

   - name: restart nginx server
     ansible.builtin.service:
      name: nginx
      state: restarted
      enabled: yes      