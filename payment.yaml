- name: configure payment server
  hosts: payment
  become: yes

  tasks:
   - name: install python3 , gcc , python-devel
     ansible.builtin.pip:
      name: "{{item}}"
      state: present
     loop:
      - python
      - gcc
      - python3-devel

   - name: create user 
     ansible.builtin.user: 
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin 

   - name: delete app directory  # used for version change
     ansible.builtin.file:
      path: /app
      state: absent

   - name: create app directory 
     ansible.builtin.file:
      path: /app
      state: directory

   - name: delete the existing code # used for version change
     ansible.builtin.file:
      path: /tmp/catalogue.zip
      state: absent

   - name: download the code from external location
     ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
      dest: /tmp/catalogue.zip

   - name: unarchieve catalogue
     ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

   - name: install dependencies
     ansible.builtin.pip:
      requirements: reqirements.txt
      executable: pip3.9
     args:
      chdir: /app

   - name: setup payment service in systemd
     ansible.builtin.template:
      src: payment.service
      dest: /etc/systemd/system/payment.service

   
   - name: daemon reload
     ansible.builtin.systemd_service:
      daemon_reload: true  

   - name: start and enable shipping    
     ansible.builtin.service:
      name: shipping
      state: started
      enabled: yes
