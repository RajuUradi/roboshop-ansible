- name: create EC2 instance
  hosts: all
  connection: local

  vars:
   ami_id: ami-0220d79f3f480ecf5
   sg_id: sg-03823503d8ed5ca23
   domain_name: learnawsdevops.online
   envr: dev
   instances1:
    - mongodb
    - catalogue

  tasks:
  - name: Create EC2 instance
    amazon.aws.ec2_instance:
     name: "{{item}}"
     security_group: "{{sg_id}}"
     instance_type: "t3.micro"
     image_id: "{{ami_id}}"
     tags:
      Project: "Roboshop"
      Environment: "Dev"
      Name: "{{item}}"
    loop: "{{instances1}}"
    register: ec2_output  

 # - name:   print ec2_output
  #  ansible.builtin.debug:
   #  msg: "{{ec2_output}}"

# Create Route53 record 

  - name: create R53 record
    amazon.aws.route53:
     state: present
     zone: "{{domain_name}}"                            # learnawsdevops.online
     record:  "{{item.item}}-{{envr}}.{{domain_name}}"  # mongodb-dev.daws88s.online,
     type: A
     ttl: 1
     value: "{{item.instances[0].public_ip_address}}"   # instances is from ec2_output 
     wait: true
     overwrite: true                                     # to override if new IP comes
    loop: "{{ec2_output.results}}"                       # list
      
