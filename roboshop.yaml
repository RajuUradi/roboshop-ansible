- name: create EC2 instance
  hosts: all
  connection: local

  vars:
   ami_id: ami-0220d79f3f480ecf5
   sg_id: sg-00389248674030ff8

  tasks:
  - name: Create EC2 instance
    amazon.aws.ec2_instance:
     name: "Roboshop"
     security_group: "{{sg_id}}"
     instance_type: "t3.micro"
     image_id: "{{ami_id}}"
     tags:
      Project: "Roboshop"
      Environment: "Dev"
      
