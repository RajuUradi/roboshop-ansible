- name: create EC2 instance
  hosts: all
  connection: local

  vars:
   ami_id: ami-0220d79f3f480ecf5
   sg_id: sg-03823503d8ed5ca23
   domain_name: learnawsdevops.online
   envr: dev
   instances:
    - mongodb
    - catalogue

  tasks:
  - name: Create EC2 instance
    amazon.aws.ec2_instance:
     name: "{{item}}"
     security_group: "{{sg_id}}"
     instance_type: "t3.micro"
     image_id: "{{ami_id}}"
     tags:
      Project: "Roboshop"
      Environment: "Dev"
      Name: "{{item}}"
    loop: "{{instances}}"
    register: ec2_output  

  - name:   print ec2_output
    ansible.builtin.debug:
     msg: "{{ec2_output}}"

