- name: configure shipping server
  hosts: shipping
  become: yes

  tasks:
   - name: install maven 
     ansible.builtin.dnf: 
      name: maven
      state: present

   - name: create system user roboshop
     ansible.builtin.user:
      name: roboshop
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

   - name: delete app directory  # useful when app version or code change happens
     ansible.builtin.file:
      path: /app
      state: absent

   - name: create app directory 
     ansible.builtin.file:
      path: /app
      state: directory

   - name: download code from external source
     ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip 
      dest: /tmp/shipping.jar      
  
   - name: unzip code
     ansible.builtin.unarchive:
      src: /tmp/shipping.jar
      dest: /app
      remote_src: yes

   - name: install dependencies
     ansible.builtin.command: maven clean package
     args:
       chdir: /app 

   - name: install dependencies
     ansible.builtin.command:  mv target/shipping-1.0.jar shipping.jar 
     args:
       chdir: /app

   - name: setup shipping service systemd 
     ansible.builtin.template:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service

   - name: daemon reload
     ansible.builtin.systemd_service:
      daemon_reload: true  

   - name: start and enable shipping    
     ansible.builtin.service:
      name: shipping
      state: started
      enabled: yes

   - name: install mysql client
     ansible.builtin.dnf:
      name: mysql
      state: present

   - name: load schema from mysql database
     ansible.builtin.command: mysql -h {{MYSQL_HOST}} -uroot -pRoboShop@1 < {{item}}
     loop:
      - /app/db/schema.sql
      - /app/db/app-user.sql 
      - /app/db/master-data.sql

   - name: start and enable shipping    
     ansible.builtin.service:
      name: shipping
      state: started
      enabled: yes  
